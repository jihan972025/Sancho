rules:
  # ============================================================
  # Python Security Rules
  # ============================================================

  # --- SQL Injection ---
  - id: python-sql-injection-format
    pattern: $CURSOR.execute($SQL % ...)
    message: "SQL injection via string formatting. Use parameterized queries instead."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  - id: python-sql-injection-fstring
    pattern: $CURSOR.execute(f"...{$VAR}...")
    message: "SQL injection via f-string. Use parameterized queries instead."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  - id: python-sql-injection-concat
    pattern: $CURSOR.execute($SQL + ...)
    message: "SQL injection via string concatenation. Use parameterized queries instead."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  # --- Command Injection ---
  - id: python-os-system
    pattern: os.system(...)
    message: "os.system() can lead to command injection. Use subprocess with shell=False."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-078: OS Command Injection"
      owasp: "A03:2021 Injection"

  - id: python-subprocess-shell-true
    pattern-either:
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
    message: "subprocess with shell=True is vulnerable to command injection. Use shell=False."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-078: OS Command Injection"
      owasp: "A03:2021 Injection"

  - id: python-os-popen
    pattern: os.popen(...)
    message: "os.popen() can lead to command injection. Use subprocess with shell=False."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Code Injection ---
  - id: python-eval
    pattern: eval(...)
    message: "eval() executes arbitrary code. Use ast.literal_eval() for parsing literals."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-094: Code Injection"

  - id: python-exec
    pattern: exec(...)
    message: "exec() executes arbitrary code and is a security risk."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-094: Code Injection"

  # --- Deserialization ---
  - id: python-pickle-load
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
    message: "pickle deserialization of untrusted data can execute arbitrary code. Use JSON."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 Software and Data Integrity Failures"

  - id: python-yaml-unsafe-load
    pattern-either:
      - pattern: yaml.load(...)
      - pattern: yaml.unsafe_load(...)
    message: "yaml.load() without SafeLoader can execute arbitrary code. Use yaml.safe_load()."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"

  - id: python-marshal-load
    pattern-either:
      - pattern: marshal.load(...)
      - pattern: marshal.loads(...)
    message: "marshal deserialization of untrusted data can execute arbitrary code."
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"

  # --- Hardcoded Secrets ---
  - id: python-hardcoded-password
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|api_key|apikey|token|secret_key|private_key)
    message: "Hardcoded credential detected. Use environment variables or a secrets manager."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 Identification and Authentication Failures"

  # --- Path Traversal ---
  - id: python-path-traversal-open
    pattern-either:
      - pattern: open($PATH + ..., ...)
      - pattern: open(f"...{$PATH}...", ...)
      - pattern: open(os.path.join(..., $REQ, ...), ...)
    message: "Potential path traversal. Validate and sanitize file paths from user input."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-022: Path Traversal"

  # --- Weak Cryptography ---
  - id: python-weak-hash-md5
    pattern: hashlib.md5(...)
    message: "MD5 is cryptographically weak. Use SHA-256 or stronger."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-328: Use of Weak Hash"

  - id: python-weak-hash-sha1
    pattern: hashlib.sha1(...)
    message: "SHA-1 is cryptographically weak. Use SHA-256 or stronger."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-328: Use of Weak Hash"

  # --- SSRF ---
  - id: python-ssrf-requests
    pattern-either:
      - pattern: requests.get($URL + ..., ...)
      - pattern: requests.get(f"...{$VAR}...", ...)
      - pattern: requests.post($URL + ..., ...)
      - pattern: requests.post(f"...{$VAR}...", ...)
    message: "Potential SSRF. Validate and restrict URLs from user input."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery"

  # --- Debug / Info Exposure ---
  - id: python-flask-debug
    pattern: app.run(..., debug=True, ...)
    message: "Flask debug mode exposes sensitive information in production."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-215: Insertion of Sensitive Information Into Debugging Code"

  - id: python-django-debug
    pattern: DEBUG = True
    message: "Django DEBUG=True exposes sensitive information in production."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-215: Insertion of Sensitive Information Into Debugging Code"

  # --- Insecure TLS ---
  - id: python-ssl-no-verify
    pattern-either:
      - pattern: requests.get(..., verify=False, ...)
      - pattern: requests.post(..., verify=False, ...)
      - pattern: requests.put(..., verify=False, ...)
      - pattern: requests.delete(..., verify=False, ...)
      - pattern: requests.patch(..., verify=False, ...)
    message: "SSL verification disabled. This allows man-in-the-middle attacks."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-295: Improper Certificate Validation"

  # --- Temporary File ---
  - id: python-tempfile-insecure
    pattern: tempfile.mktemp(...)
    message: "tempfile.mktemp() is insecure (race condition). Use tempfile.mkstemp()."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-377: Insecure Temporary File"

  # --- Assert for access control ---
  - id: python-assert-access-control
    pattern: assert $COND
    message: "assert is removed with -O flag. Do not use for access control."
    severity: INFO
    languages: [python]
    metadata:
      cwe: "CWE-617: Reachable Assertion"

  # ============================================================
  # JavaScript / TypeScript Security Rules
  # ============================================================

  # --- XSS ---
  - id: js-innerhtml-assignment
    pattern: $EL.innerHTML = $VAL
    message: "Direct innerHTML assignment can lead to XSS. Use textContent or DOMPurify."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"
      owasp: "A03:2021 Injection"

  - id: js-outerhtml-assignment
    pattern: $EL.outerHTML = $VAL
    message: "Direct outerHTML assignment can lead to XSS."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"

  - id: js-document-write
    pattern: document.write(...)
    message: "document.write() can introduce XSS vulnerabilities."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"

  - id: react-dangerouslysetinnerhtml
    pattern-either:
      - pattern: <$EL dangerouslySetInnerHTML={...} />
      - pattern: <$EL dangerouslySetInnerHTML={...}>...</$EL>
    message: "dangerouslySetInnerHTML can lead to XSS if content is not sanitized."
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"

  # --- SQL Injection (Node.js) ---
  - id: js-sql-injection-template
    pattern-either:
      - pattern: $DB.query(`...${$VAR}...`)
      - pattern: $DB.query($SQL + ...)
    message: "SQL injection via string interpolation. Use parameterized queries."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  # --- Command Injection (Node.js) ---
  - id: js-child-process-exec
    pattern-either:
      - pattern: child_process.exec(...)
      - pattern: exec(...)
    message: "child_process.exec() runs in a shell. Use execFile() or spawn()."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  - id: js-execsync-usage
    pattern-either:
      - pattern: execSync(...)
      - pattern: child_process.execSync(...)
    message: "execSync() runs commands in a shell. Ensure arguments are not from untrusted sources."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Code Injection ---
  - id: js-eval
    pattern: eval(...)
    message: "eval() executes arbitrary code and can lead to code injection."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-094: Code Injection"

  - id: js-function-constructor
    pattern: new Function(...)
    message: "new Function() is similar to eval() and can execute arbitrary code."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-094: Code Injection"

  # --- Hardcoded Secrets ---
  - id: js-hardcoded-secret
    patterns:
      - pattern: |
          const $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|api_key|apiKey|token|secretKey|privateKey|API_SECRET)
    message: "Hardcoded credential detected. Use environment variables."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 Identification and Authentication Failures"

  # --- Path Traversal (Node.js) ---
  - id: js-path-traversal
    pattern-either:
      - pattern: fs.readFileSync($PATH + ..., ...)
      - pattern: fs.readFileSync(`...${$VAR}...`, ...)
      - pattern: fs.readFile($PATH + ..., ...)
      - pattern: fs.readFile(`...${$VAR}...`, ...)
      - pattern: fs.writeFileSync($PATH + ..., ...)
      - pattern: fs.writeFileSync(`...${$VAR}...`, ...)
    message: "Potential path traversal. Validate and sanitize file paths."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-022: Path Traversal"

  # --- Insecure Randomness ---
  - id: js-math-random-crypto
    pattern: Math.random()
    message: "Math.random() is not cryptographically secure. Use crypto.getRandomValues()."
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-338: Use of Cryptographically Weak PRNG"

  # --- Prototype Pollution ---
  - id: js-prototype-pollution
    pattern-either:
      - pattern: $OBJ.__proto__ = ...
      - pattern: $OBJ["__proto__"] = ...
      - pattern: $OBJ.constructor.prototype.$PROP = ...
    message: "Prototype pollution can lead to property injection attacks."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1321: Improperly Controlled Modification of Object Prototype Attributes"

  # --- Open Redirect ---
  - id: js-open-redirect
    pattern-either:
      - pattern: window.location = $VAR
      - pattern: window.location.href = $VAR
      - pattern: $RES.redirect($VAR)
    message: "Potential open redirect. Validate redirect URLs against a whitelist."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-601: URL Redirection to Untrusted Site"

  # --- CORS Misconfiguration ---
  - id: js-cors-wildcard
    pattern-either:
      - pattern: |
          $RES.setHeader("Access-Control-Allow-Origin", "*")
      - pattern: |
          cors({origin: "*"})
      - pattern: |
          cors({ origin: true })
    message: "CORS wildcard allows any origin. Restrict to trusted domains."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"

  # --- JWT Issues ---
  - id: js-jwt-no-verify
    pattern: jwt.decode(...)
    message: "jwt.decode() does not verify the signature. Use jwt.verify() instead."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-345: Insufficient Verification of Data Authenticity"

  # --- Electron Security ---
  - id: electron-web-security-false
    pattern: |
      webSecurity: false
    message: "webSecurity disabled. This allows cross-origin attacks from loaded content."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-346: Origin Validation Error"

  - id: electron-node-integration-true
    pattern: |
      nodeIntegration: true
    message: "nodeIntegration enabled. Loaded content can access Node.js APIs."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-094: Code Injection"

  - id: electron-context-isolation-false
    pattern: |
      contextIsolation: false
    message: "contextIsolation disabled. Preload scripts share context with page content."
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-094: Code Injection"

  # --- Weak Crypto (Node.js) ---
  - id: js-weak-hash
    pattern-either:
      - pattern: crypto.createHash("md5")
      - pattern: crypto.createHash('md5')
      - pattern: crypto.createHash("sha1")
      - pattern: crypto.createHash('sha1')
    message: "Weak hash algorithm. Use SHA-256 or stronger."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-328: Use of Weak Hash"

  # --- PostMessage ---
  - id: js-postmessage-wildcard
    pattern-either:
      - pattern: $W.postMessage(..., "*")
      - pattern: window.postMessage(..., "*")
    message: "postMessage with wildcard origin. Specify target origin explicitly."
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-346: Origin Validation Error"

  # ============================================================
  # Java Security Rules
  # ============================================================

  # --- SQL Injection ---
  - id: java-sql-injection
    pattern-either:
      - pattern: $STMT.executeQuery($SQL + ...)
      - pattern: $STMT.executeUpdate($SQL + ...)
      - pattern: $STMT.execute($SQL + ...)
    message: "SQL injection via string concatenation. Use PreparedStatement."
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  # --- Command Injection ---
  - id: java-runtime-exec
    pattern: Runtime.getRuntime().exec(...)
    message: "Runtime.exec() can be vulnerable to command injection. Use ProcessBuilder."
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Deserialization ---
  - id: java-objectinputstream
    pattern: new ObjectInputStream(...)
    message: "Java deserialization of untrusted data can lead to RCE. Use JSON."
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 Software and Data Integrity Failures"

  # --- XXE ---
  - id: java-xxe-parser
    patterns:
      - pattern: |
          $FACTORY = DocumentBuilderFactory.newInstance();
          ...
          $BUILDER = $FACTORY.newDocumentBuilder();
    message: "XML parser without disabling external entities is vulnerable to XXE."
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-611: XML External Entity (XXE)"

  # --- Hardcoded Secrets ---
  - id: java-hardcoded-password
    patterns:
      - pattern: |
          String $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|apiKey|token|secretKey|privateKey)
    message: "Hardcoded credential detected. Use configuration or secrets manager."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"

  # --- Weak Crypto ---
  - id: java-weak-cipher
    pattern-either:
      - pattern: Cipher.getInstance("DES")
      - pattern: Cipher.getInstance("DES/...")
      - pattern: Cipher.getInstance("RC4")
      - pattern: Cipher.getInstance("RC2")
      - pattern: Cipher.getInstance("Blowfish")
    message: "Weak encryption algorithm. Use AES with 256-bit key."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"

  - id: java-ecb-mode
    pattern: Cipher.getInstance("AES/ECB/...")
    message: "ECB mode does not provide semantic security. Use CBC or GCM mode."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"

  # --- SSRF ---
  - id: java-ssrf-url
    pattern-either:
      - pattern: new URL($VAR).openConnection()
      - pattern: new URL($VAR).openStream()
    message: "Potential SSRF. Validate and restrict user-supplied URLs."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery"

  # --- Log Injection ---
  - id: java-log-injection
    pattern-either:
      - pattern: $LOG.info($VAR + ...)
      - pattern: $LOG.error($VAR + ...)
      - pattern: $LOG.warn($VAR + ...)
      - pattern: $LOG.debug($VAR + ...)
    message: "Log injection via string concatenation. Use parameterized logging."
    severity: INFO
    languages: [java]
    metadata:
      cwe: "CWE-117: Improper Output Neutralization for Logs"

  # --- Insecure Random ---
  - id: java-insecure-random
    pattern: new Random(...)
    message: "java.util.Random is not cryptographically secure. Use SecureRandom for security-sensitive operations."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-330: Use of Insufficiently Random Values"
      owasp: "A02:2021 Cryptographic Failures"

  # --- Sensitive Data Logging ---
  - id: java-sensitive-data-log
    patterns:
      - pattern-either:
          - pattern: $LOG.info($MSG, $TOKEN)
          - pattern: $LOG.debug($MSG, $TOKEN)
          - pattern: $LOG.warn($MSG, $TOKEN)
          - pattern: $LOG.error($MSG, $TOKEN)
          - pattern: $LOG.info($MSG, $TOKEN, ...)
          - pattern: $LOG.debug($MSG, $TOKEN, ...)
      - metavariable-regex:
          metavariable: $TOKEN
          regex: (?i)(.*token.*|.*password.*|.*passwd.*|.*secret.*|.*credential.*|.*apikey.*)
    message: "Sensitive data (token/password/secret) logged. Remove or mask sensitive values in log output."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp: "A09:2021 Security Logging and Monitoring Failures"

  # --- Open Redirect ---
  - id: java-open-redirect
    pattern: $RESPONSE.sendRedirect(...)
    message: "Potential open redirect. Validate redirect URLs against a whitelist of allowed destinations."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-601: URL Redirection to Untrusted Site"

  # --- Spring CORS Misconfiguration ---
  - id: java-cors-allow-all-methods
    pattern: |
      $CONFIG.addAllowedMethod("*")
    message: "CORS allows all HTTP methods. Explicitly list only required methods (GET, POST, etc.)."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"
      owasp: "A05:2021 Security Misconfiguration"

  - id: java-cors-allow-all-headers
    pattern: |
      $CONFIG.addAllowedHeader("*")
    message: "CORS allows all headers. Explicitly list only required headers."
    severity: INFO
    languages: [java]
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"

  - id: java-cors-credentials-with-wildcard
    patterns:
      - pattern: |
          $CONFIG.setAllowCredentials(true)
      - pattern: |
          $CONFIG.addAllowedMethod("*")
    message: "CORS allows credentials with wildcard methods. This increases CSRF attack surface."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"

  # --- WebSocket Wildcard Origin ---
  - id: java-websocket-wildcard-origin
    pattern-either:
      - pattern: |
          $REGISTRY.setAllowedOriginPatterns("*")
      - pattern: |
          $REGISTRY.setAllowedOrigins("*")
    message: "WebSocket allows all origins. Restrict to trusted domains only."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"

  # --- @CrossOrigin without restrictions ---
  - id: java-crossorigin-unrestricted
    pattern: |
      @CrossOrigin
      class $CLASS { ... }
    message: "@CrossOrigin without origin restrictions allows requests from all origins. Specify allowed origins."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"

  # --- CSRF Disabled ---
  - id: java-csrf-disabled
    pattern: $HTTP.csrf().disable()
    message: "CSRF protection is disabled. Ensure alternative CSRF mitigation (e.g., JWT tokens) is in place."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-352: Cross-Site Request Forgery (CSRF)"
      owasp: "A01:2021 Broken Access Control"

  # --- System.out in production ---
  - id: java-system-out-println
    pattern-either:
      - pattern: System.out.println(...)
      - pattern: System.out.print(...)
      - pattern: System.err.println(...)
      - pattern: System.err.print(...)
    message: "System.out/err in production code. Use a proper logging framework (SLF4J/Log4j)."
    severity: INFO
    languages: [java]
    metadata:
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"

  # --- Weak Hash (Java) ---
  - id: java-weak-hash
    pattern-either:
      - pattern: MessageDigest.getInstance("MD5")
      - pattern: MessageDigest.getInstance("SHA-1")
      - pattern: MessageDigest.getInstance("SHA1")
    message: "Weak hash algorithm (MD5/SHA-1). Use SHA-256 or stronger for security purposes."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-328: Use of Weak Hash"

  # --- Path Traversal (Java) ---
  - id: java-path-traversal
    pattern-either:
      - pattern: new File($VAR + ...)
      - pattern: Paths.get($VAR + ...)
    message: "Potential path traversal. Validate and canonicalize file paths from user input."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-022: Path Traversal"

  # --- Cookie without HttpOnly ---
  - id: java-cookie-no-httponly
    patterns:
      - pattern: |
          $COOKIE = new Cookie(...);
          ...
          $RESPONSE.addCookie($COOKIE);
      - pattern-not: |
          $COOKIE = new Cookie(...);
          ...
          $COOKIE.setHttpOnly(true);
          ...
          $RESPONSE.addCookie($COOKIE);
    message: "Cookie set without HttpOnly flag. Set setHttpOnly(true) to prevent XSS cookie theft."
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-1004: Sensitive Cookie Without HttpOnly Flag"

  # --- Exception Swallowing ---
  - id: java-empty-catch
    pattern: |
      try { ... } catch ($TYPE $EX) { }
    message: "Empty catch block swallows exceptions silently. Log or handle the exception."
    severity: INFO
    languages: [java]
    metadata:
      cwe: "CWE-390: Detection of Error Condition Without Action"

  # --- Trust All Certificates ---
  - id: java-trust-all-certs
    pattern-either:
      - pattern: |
          new X509TrustManager() { ... }
      - pattern: |
          $X.setHostnameVerifier(($H, $S) -> true)
    message: "Custom TrustManager or HostnameVerifier bypasses certificate validation. This allows MITM attacks."
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-295: Improper Certificate Validation"

  # --- LDAP Injection ---
  - id: java-ldap-injection
    pattern-either:
      - pattern: $CTX.search($BASE, $FILTER + ..., ...)
      - pattern: $CTX.search($BASE, "..." + $INPUT + "...", ...)
    message: "LDAP injection via string concatenation. Use parameterized LDAP queries."
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-090: LDAP Injection"

  # ============================================================
  # Go Security Rules
  # ============================================================

  # --- SQL Injection ---
  - id: go-sql-injection
    pattern-either:
      - pattern: $DB.Query($SQL + ...)
      - pattern: $DB.Exec($SQL + ...)
      - pattern: $DB.QueryRow($SQL + ...)
    message: "SQL injection via string concatenation. Use parameterized queries."
    severity: ERROR
    languages: [go]
    metadata:
      cwe: "CWE-089: SQL Injection"

  - id: go-sql-injection-fmt
    pattern-either:
      - pattern: $DB.Query(fmt.Sprintf(...))
      - pattern: $DB.Exec(fmt.Sprintf(...))
      - pattern: $DB.QueryRow(fmt.Sprintf(...))
    message: "SQL injection via fmt.Sprintf(). Use parameterized queries."
    severity: ERROR
    languages: [go]
    metadata:
      cwe: "CWE-089: SQL Injection"

  # --- Command Injection ---
  - id: go-command-injection
    pattern-either:
      - pattern: exec.Command("bash", "-c", $VAR)
      - pattern: exec.Command("sh", "-c", $VAR)
      - pattern: exec.Command("/bin/sh", "-c", $VAR)
      - pattern: exec.Command("/bin/bash", "-c", $VAR)
    message: "Potential command injection. Pass commands and arguments separately."
    severity: ERROR
    languages: [go]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Insecure TLS ---
  - id: go-tls-insecure
    pattern: |
      &tls.Config{..., InsecureSkipVerify: true, ...}
    message: "TLS certificate verification disabled. This allows MITM attacks."
    severity: WARNING
    languages: [go]
    metadata:
      cwe: "CWE-295: Improper Certificate Validation"

  # --- Hardcoded Secrets ---
  - id: go-hardcoded-secret
    patterns:
      - pattern: |
          $VAR := "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|apiKey|token|secretKey|privateKey)
    message: "Hardcoded credential detected. Use environment variables."
    severity: WARNING
    languages: [go]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"

  # ============================================================
  # C / C++ Security Rules
  # ============================================================

  - id: c-gets-usage
    pattern: gets(...)
    message: "gets() has no bounds checking. Use fgets() instead."
    severity: ERROR
    languages: [c]
    metadata:
      cwe: "CWE-120: Buffer Copy without Checking Size of Input"

  - id: c-strcpy-usage
    pattern: strcpy(...)
    message: "strcpy() has no bounds checking. Use strncpy() or strlcpy()."
    severity: WARNING
    languages: [c]
    metadata:
      cwe: "CWE-120: Buffer Copy without Checking Size of Input"

  - id: c-sprintf-usage
    pattern: sprintf(...)
    message: "sprintf() has no bounds checking. Use snprintf() instead."
    severity: WARNING
    languages: [c]
    metadata:
      cwe: "CWE-120: Buffer Copy without Checking Size of Input"

  - id: c-format-string
    pattern-either:
      - pattern: printf($VAR)
      - pattern: fprintf($FILE, $VAR)
      - pattern: sprintf($BUF, $VAR)
    message: "Potential format string vulnerability. Always use a format specifier."
    severity: ERROR
    languages: [c]
    metadata:
      cwe: "CWE-134: Use of Externally-Controlled Format String"

  # ============================================================
  # PHP Security Rules
  # ============================================================

  - id: php-sql-injection
    pattern-either:
      - pattern: mysqli_query($CONN, $SQL . $INPUT);
      - pattern: $PDO->query($SQL . $INPUT);
    message: "SQL injection via string concatenation. Use prepared statements."
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-089: SQL Injection"

  - id: php-shell-exec
    pattern-either:
      - pattern: shell_exec(...);
      - pattern: system(...);
      - pattern: passthru(...);
      - pattern: exec(...);
    message: "Potential command injection. Use escapeshellarg() and escapeshellcmd()."
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  - id: php-echo-unsanitized
    pattern-either:
      - pattern: echo $_GET[$KEY];
      - pattern: echo $_POST[$KEY];
      - pattern: echo $_REQUEST[$KEY];
    message: "XSS via direct output of user input. Use htmlspecialchars()."
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"

  - id: php-file-inclusion
    pattern-either:
      - pattern: include($_GET[$KEY]);
      - pattern: include($_POST[$KEY]);
      - pattern: require($_GET[$KEY]);
      - pattern: require_once($_GET[$KEY]);
    message: "Local/Remote file inclusion via user input. Validate file paths."
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-098: Improper Control of Filename for Include/Require"

  # ============================================================
  # Ruby Security Rules
  # ============================================================

  - id: ruby-backtick-injection
    pattern: |
      `...#{$VAR}...`
    message: "Potential command injection via backtick interpolation."
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  - id: ruby-system-call
    pattern: system(...)
    message: "system() call can be vulnerable to command injection."
    severity: WARNING
    languages: [ruby]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  - id: ruby-sql-injection
    pattern-either:
      - pattern: $MODEL.where("...#{$VAR}...")
      - pattern: $MODEL.find_by_sql("...#{$VAR}...")
    message: "SQL injection via string interpolation. Use parameterized queries."
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-089: SQL Injection"

  - id: ruby-mass-assignment
    pattern: params.permit!
    message: "Mass assignment vulnerability. Explicitly whitelist permitted parameters."
    severity: WARNING
    languages: [ruby]
    metadata:
      cwe: "CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes"

  - id: ruby-yaml-load
    pattern: YAML.load(...)
    message: "YAML.load() can execute arbitrary code. Use YAML.safe_load() instead."
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"

  - id: ruby-marshal-load
    pattern: Marshal.load(...)
    message: "Marshal.load() of untrusted data can execute arbitrary code."
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
