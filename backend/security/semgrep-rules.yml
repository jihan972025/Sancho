rules:
  # ============================================================
  # Python Security Rules
  # ============================================================

  # --- SQL Injection ---
  - id: python-sql-injection-format
    patterns:
      - pattern: |
          $CURSOR.execute($SQL % ...)
    message: >
      SQL injection via string formatting. Use parameterized queries instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  - id: python-sql-injection-fstring
    patterns:
      - pattern: |
          $CURSOR.execute(f"...{$VAR}...")
    message: >
      SQL injection via f-string. Use parameterized queries instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  - id: python-sql-injection-concat
    patterns:
      - pattern: |
          $CURSOR.execute($SQL + ...)
    message: >
      SQL injection via string concatenation. Use parameterized queries instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  # --- Command Injection ---
  - id: python-os-system
    pattern: os.system(...)
    message: >
      Use of os.system() can lead to command injection. Use subprocess with
      shell=False instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-078: OS Command Injection"
      owasp: "A03:2021 Injection"

  - id: python-subprocess-shell-true
    patterns:
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
    message: >
      subprocess with shell=True is vulnerable to command injection.
      Use shell=False and pass args as a list.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-078: OS Command Injection"
      owasp: "A03:2021 Injection"

  - id: python-os-popen
    pattern: os.popen(...)
    message: >
      os.popen() can lead to command injection. Use subprocess with shell=False.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Code Injection ---
  - id: python-eval
    pattern: eval(...)
    message: >
      eval() executes arbitrary code. Avoid eval() or use ast.literal_eval()
      for parsing literals.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-094: Code Injection"

  - id: python-exec
    pattern: exec(...)
    message: >
      exec() executes arbitrary code and is a security risk.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-094: Code Injection"

  # --- Deserialization ---
  - id: python-pickle-load
    patterns:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
    message: >
      pickle deserialization of untrusted data can execute arbitrary code.
      Use JSON or other safe formats.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 Software and Data Integrity Failures"

  - id: python-yaml-unsafe-load
    patterns:
      - pattern: yaml.load(...)
      - pattern: yaml.unsafe_load(...)
    message: >
      yaml.load() without SafeLoader can execute arbitrary code.
      Use yaml.safe_load() instead.
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"

  # --- Hardcoded Secrets ---
  - id: python-hardcoded-password
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|api_key|apikey|token|secret_key|private_key)
    message: >
      Hardcoded credential detected. Use environment variables or a secrets manager.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 Identification and Authentication Failures"

  # --- Path Traversal ---
  - id: python-path-traversal-open
    patterns:
      - pattern: open($PATH + ..., ...)
      - pattern: open(f"...{$PATH}...", ...)
      - pattern: open(os.path.join(..., $REQ, ...), ...)
    message: >
      Potential path traversal. Validate and sanitize file paths from user input.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-022: Path Traversal"

  # --- Weak Cryptography ---
  - id: python-weak-hash-md5
    patterns:
      - pattern: hashlib.md5(...)
    message: >
      MD5 is cryptographically weak. Use SHA-256 or stronger.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-328: Use of Weak Hash"

  - id: python-weak-hash-sha1
    patterns:
      - pattern: hashlib.sha1(...)
    message: >
      SHA-1 is cryptographically weak. Use SHA-256 or stronger.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-328: Use of Weak Hash"

  # --- SSRF ---
  - id: python-ssrf-requests
    patterns:
      - pattern: requests.get($URL + ..., ...)
      - pattern: requests.get(f"...{$VAR}...", ...)
      - pattern: requests.post($URL + ..., ...)
      - pattern: requests.post(f"...{$VAR}...", ...)
    message: >
      Potential SSRF. Validate and restrict URLs from user input.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery"

  # --- Debug / Info Exposure ---
  - id: python-flask-debug
    pattern: app.run(..., debug=True, ...)
    message: >
      Flask debug mode exposes sensitive information in production.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-215: Insertion of Sensitive Information Into Debugging Code"

  - id: python-django-debug
    pattern: DEBUG = True
    message: >
      Django DEBUG=True exposes sensitive information in production.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-215: Insertion of Sensitive Information Into Debugging Code"

  # --- Insecure TLS ---
  - id: python-ssl-no-verify
    patterns:
      - pattern: requests.get(..., verify=False, ...)
      - pattern: requests.post(..., verify=False, ...)
      - pattern: requests.put(..., verify=False, ...)
      - pattern: requests.delete(..., verify=False, ...)
      - pattern: requests.patch(..., verify=False, ...)
    message: >
      SSL verification disabled. This allows man-in-the-middle attacks.
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-295: Improper Certificate Validation"

  # --- Temporary File ---
  - id: python-tempfile-insecure
    patterns:
      - pattern: tempfile.mktemp(...)
    message: >
      tempfile.mktemp() is insecure (race condition). Use tempfile.mkstemp().
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-377: Insecure Temporary File"

  # ============================================================
  # JavaScript / TypeScript Security Rules
  # ============================================================

  # --- XSS ---
  - id: js-innerhtml-assignment
    patterns:
      - pattern: $EL.innerHTML = $VAL
    message: >
      Direct innerHTML assignment can lead to XSS. Use textContent or
      a sanitization library like DOMPurify.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"
      owasp: "A03:2021 Injection"

  - id: js-document-write
    patterns:
      - pattern: document.write(...)
    message: >
      document.write() can introduce XSS vulnerabilities.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"

  - id: react-dangerouslysetinnerhtml
    patterns:
      - pattern: <$EL dangerouslySetInnerHTML={...} />
      - pattern: <$EL dangerouslySetInnerHTML={...}>...</$EL>
    message: >
      dangerouslySetInnerHTML can lead to XSS if content is not sanitized.
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"

  # --- SQL Injection (Node.js) ---
  - id: js-sql-injection-template
    patterns:
      - pattern: $DB.query(`...${$VAR}...`)
      - pattern: $DB.query($SQL + ...)
    message: >
      SQL injection via string interpolation. Use parameterized queries.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  # --- Command Injection (Node.js) ---
  - id: js-child-process-exec
    patterns:
      - pattern: child_process.exec(...)
      - pattern: exec(...)
    message: >
      child_process.exec() runs commands in a shell and is vulnerable to
      injection. Use execFile() or spawn() with arguments as an array.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Code Injection ---
  - id: js-eval
    pattern: eval(...)
    message: >
      eval() executes arbitrary code and can lead to code injection.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-094: Code Injection"

  - id: js-function-constructor
    pattern: new Function(...)
    message: >
      new Function() is similar to eval() and can execute arbitrary code.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-094: Code Injection"

  # --- Hardcoded Secrets ---
  - id: js-hardcoded-secret
    patterns:
      - pattern: |
          const $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|api_key|apiKey|token|secretKey|privateKey|API_SECRET)
    message: >
      Hardcoded credential detected. Use environment variables.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 Identification and Authentication Failures"

  # --- Path Traversal (Node.js) ---
  - id: js-path-traversal
    patterns:
      - pattern: fs.readFileSync($PATH + ..., ...)
      - pattern: fs.readFileSync(`...${$VAR}...`, ...)
      - pattern: fs.readFile($PATH + ..., ...)
      - pattern: fs.readFile(`...${$VAR}...`, ...)
      - pattern: fs.writeFileSync($PATH + ..., ...)
      - pattern: fs.writeFileSync(`...${$VAR}...`, ...)
    message: >
      Potential path traversal. Validate and sanitize file paths.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-022: Path Traversal"

  # --- Insecure Randomness ---
  - id: js-math-random-crypto
    patterns:
      - pattern: Math.random()
    message: >
      Math.random() is not cryptographically secure. Use crypto.randomBytes()
      or crypto.getRandomValues() for security-sensitive operations.
    severity: INFO
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-338: Use of Cryptographically Weak PRNG"

  # --- Prototype Pollution ---
  - id: js-prototype-pollution
    patterns:
      - pattern: $OBJ.__proto__ = ...
      - pattern: $OBJ["__proto__"] = ...
      - pattern: $OBJ.constructor.prototype.$PROP = ...
    message: >
      Prototype pollution can lead to property injection attacks.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1321: Improperly Controlled Modification of Object Prototype Attributes"

  # --- Open Redirect ---
  - id: js-open-redirect
    patterns:
      - pattern: window.location = $VAR
      - pattern: window.location.href = $VAR
      - pattern: $RES.redirect($VAR)
    message: >
      Potential open redirect. Validate redirect URLs against a whitelist.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-601: URL Redirection to Untrusted Site"

  # --- CORS Misconfiguration ---
  - id: js-cors-wildcard
    patterns:
      - pattern: |
          $RES.setHeader("Access-Control-Allow-Origin", "*")
      - pattern: |
          cors({origin: "*"})
      - pattern: |
          cors({ origin: true })
    message: >
      CORS wildcard allows any origin. Restrict to trusted domains.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"

  # --- JWT Issues ---
  - id: js-jwt-no-verify
    patterns:
      - pattern: jwt.decode(...)
    message: >
      jwt.decode() does not verify the signature. Use jwt.verify() instead.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-345: Insufficient Verification of Data Authenticity"

  # ============================================================
  # Java Security Rules
  # ============================================================

  # --- SQL Injection ---
  - id: java-sql-injection
    patterns:
      - pattern: |
          $STMT.executeQuery($SQL + ...)
      - pattern: |
          $STMT.executeUpdate($SQL + ...)
      - pattern: |
          $STMT.execute($SQL + ...)
    message: >
      SQL injection via string concatenation. Use PreparedStatement.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-089: SQL Injection"
      owasp: "A03:2021 Injection"

  # --- Command Injection ---
  - id: java-runtime-exec
    pattern: Runtime.getRuntime().exec(...)
    message: >
      Runtime.exec() can be vulnerable to command injection.
      Use ProcessBuilder with argument list.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Deserialization ---
  - id: java-objectinputstream
    patterns:
      - pattern: new ObjectInputStream(...)
    message: >
      Java deserialization of untrusted data can lead to remote code execution.
      Use a safe alternative like JSON.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 Software and Data Integrity Failures"

  # --- XXE ---
  - id: java-xxe-parser
    patterns:
      - pattern: |
          $FACTORY = DocumentBuilderFactory.newInstance();
          ...
          $BUILDER = $FACTORY.newDocumentBuilder();
    message: >
      XML parser without disabling external entities is vulnerable to XXE.
      Set FEATURE_SECURE_PROCESSING and disable external entities.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-611: XML External Entity (XXE)"

  # --- Hardcoded Secrets ---
  - id: java-hardcoded-password
    patterns:
      - pattern: |
          String $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|apiKey|token|secretKey|privateKey)
    message: >
      Hardcoded credential detected. Use configuration or secrets manager.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"

  # --- Weak Crypto ---
  - id: java-weak-cipher
    patterns:
      - pattern: Cipher.getInstance("DES")
      - pattern: Cipher.getInstance("DES/...")
      - pattern: Cipher.getInstance("RC4")
      - pattern: Cipher.getInstance("RC2")
      - pattern: Cipher.getInstance("Blowfish")
    message: >
      Weak encryption algorithm. Use AES with 256-bit key.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"

  - id: java-ecb-mode
    patterns:
      - pattern: Cipher.getInstance("AES/ECB/...")
    message: >
      ECB mode does not provide semantic security. Use CBC or GCM mode.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"

  # --- SSRF ---
  - id: java-ssrf-url
    patterns:
      - pattern: new URL($VAR).openConnection()
      - pattern: new URL($VAR).openStream()
    message: >
      Potential SSRF. Validate and restrict user-supplied URLs.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery"

  # --- Log Injection ---
  - id: java-log-injection
    patterns:
      - pattern: $LOG.info($VAR + ...)
      - pattern: $LOG.error($VAR + ...)
      - pattern: $LOG.warn($VAR + ...)
      - pattern: $LOG.debug($VAR + ...)
    message: >
      Log injection via string concatenation. Use parameterized logging.
    severity: INFO
    languages: [java]
    metadata:
      cwe: "CWE-117: Improper Output Neutralization for Logs"

  # ============================================================
  # Go Security Rules
  # ============================================================

  # --- SQL Injection ---
  - id: go-sql-injection
    patterns:
      - pattern: $DB.Query($SQL + ...)
      - pattern: $DB.Exec($SQL + ...)
      - pattern: $DB.QueryRow($SQL + ...)
    message: >
      SQL injection via string concatenation. Use parameterized queries.
    severity: ERROR
    languages: [go]
    metadata:
      cwe: "CWE-089: SQL Injection"

  - id: go-sql-injection-fmt
    patterns:
      - pattern: $DB.Query(fmt.Sprintf(...))
      - pattern: $DB.Exec(fmt.Sprintf(...))
      - pattern: $DB.QueryRow(fmt.Sprintf(...))
    message: >
      SQL injection via fmt.Sprintf(). Use parameterized queries.
    severity: ERROR
    languages: [go]
    metadata:
      cwe: "CWE-089: SQL Injection"

  # --- Command Injection ---
  - id: go-command-injection
    patterns:
      - pattern: exec.Command("bash", "-c", $VAR)
      - pattern: exec.Command("sh", "-c", $VAR)
      - pattern: exec.Command("/bin/sh", "-c", $VAR)
      - pattern: exec.Command("/bin/bash", "-c", $VAR)
    message: >
      Potential command injection via shell execution.
      Pass commands and arguments separately.
    severity: ERROR
    languages: [go]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- Insecure TLS ---
  - id: go-tls-insecure
    patterns:
      - pattern: |
          &tls.Config{..., InsecureSkipVerify: true, ...}
    message: >
      TLS certificate verification disabled. This allows MITM attacks.
    severity: WARNING
    languages: [go]
    metadata:
      cwe: "CWE-295: Improper Certificate Validation"

  # --- Hardcoded Secrets ---
  - id: go-hardcoded-secret
    patterns:
      - pattern: |
          $VAR := "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|apiKey|token|secretKey|privateKey)
    message: >
      Hardcoded credential detected. Use environment variables.
    severity: WARNING
    languages: [go]
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"

  # ============================================================
  # C / C++ Security Rules
  # ============================================================

  # --- Buffer Overflow ---
  - id: c-gets-usage
    pattern: gets(...)
    message: >
      gets() has no bounds checking and is vulnerable to buffer overflow.
      Use fgets() instead.
    severity: ERROR
    languages: [c]
    metadata:
      cwe: "CWE-120: Buffer Copy without Checking Size of Input"

  - id: c-strcpy-usage
    pattern: strcpy(...)
    message: >
      strcpy() has no bounds checking. Use strncpy() or strlcpy().
    severity: WARNING
    languages: [c]
    metadata:
      cwe: "CWE-120: Buffer Copy without Checking Size of Input"

  - id: c-sprintf-usage
    pattern: sprintf(...)
    message: >
      sprintf() has no bounds checking. Use snprintf() instead.
    severity: WARNING
    languages: [c]
    metadata:
      cwe: "CWE-120: Buffer Copy without Checking Size of Input"

  # --- Format String ---
  - id: c-format-string
    patterns:
      - pattern: printf($VAR)
      - pattern: fprintf($FILE, $VAR)
      - pattern: sprintf($BUF, $VAR)
    message: >
      Potential format string vulnerability. Always use a format specifier.
    severity: ERROR
    languages: [c]
    metadata:
      cwe: "CWE-134: Use of Externally-Controlled Format String"

  # ============================================================
  # PHP Security Rules
  # ============================================================

  # --- SQL Injection ---
  - id: php-sql-injection
    pattern-either:
      - pattern: mysqli_query($CONN, $SQL . $INPUT);
      - pattern: $PDO->query($SQL . $INPUT);
    message: >
      SQL injection via string concatenation. Use prepared statements.
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-089: SQL Injection"

  # --- Command Injection ---
  - id: php-shell-exec
    pattern-either:
      - pattern: shell_exec(...);
      - pattern: system(...);
      - pattern: passthru(...);
      - pattern: exec(...);
    message: >
      Potential command injection via shell function.
      Use escapeshellarg() and escapeshellcmd().
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- XSS ---
  - id: php-echo-unsanitized
    pattern-either:
      - pattern: echo $_GET[$KEY];
      - pattern: echo $_POST[$KEY];
      - pattern: echo $_REQUEST[$KEY];
    message: >
      XSS via direct output of user input. Use htmlspecialchars().
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-079: Cross-site Scripting (XSS)"

  # --- File Inclusion ---
  - id: php-file-inclusion
    pattern-either:
      - pattern: include($_GET[$KEY]);
      - pattern: include($_POST[$KEY]);
      - pattern: require($_GET[$KEY]);
      - pattern: require_once($_GET[$KEY]);
    message: >
      Local/Remote file inclusion via user input. Validate file paths.
    severity: ERROR
    languages: [php]
    metadata:
      cwe: "CWE-098: Improper Control of Filename for Include/Require"

  # ============================================================
  # Ruby Security Rules
  # ============================================================

  # --- Command Injection ---
  - id: ruby-backtick-injection
    patterns:
      - pattern: |
          `...#{$VAR}...`
    message: >
      Potential command injection via backtick interpolation.
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  - id: ruby-system-call
    patterns:
      - pattern: system(...)
    message: >
      system() call can be vulnerable to command injection.
    severity: WARNING
    languages: [ruby]
    metadata:
      cwe: "CWE-078: OS Command Injection"

  # --- SQL Injection ---
  - id: ruby-sql-injection
    patterns:
      - pattern: $MODEL.where("...#{$VAR}...")
      - pattern: $MODEL.find_by_sql("...#{$VAR}...")
    message: >
      SQL injection via string interpolation. Use parameterized queries.
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-089: SQL Injection"

  # --- Mass Assignment ---
  - id: ruby-mass-assignment
    patterns:
      - pattern: params.permit!
    message: >
      Mass assignment vulnerability. Explicitly whitelist permitted parameters.
    severity: WARNING
    languages: [ruby]
    metadata:
      cwe: "CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes"

  # --- Deserialization ---
  - id: ruby-yaml-load
    patterns:
      - pattern: YAML.load(...)
    message: >
      YAML.load() can execute arbitrary code. Use YAML.safe_load() instead.
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"

  - id: ruby-marshal-load
    patterns:
      - pattern: Marshal.load(...)
    message: >
      Marshal.load() of untrusted data can execute arbitrary code.
    severity: ERROR
    languages: [ruby]
    metadata:
      cwe: "CWE-502: Deserialization of Untrusted Data"
